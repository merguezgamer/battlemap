<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Battlemap</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;--surf:#161a24;--surf2:#1e2230;--bord:#2a2f3f;
  --gold:#c8a96e;--blue:#5c7cff;--red:#e05252;--green:#52c97a;--purple:#c878f0;
  --text:#ddd5c4;--muted:#5a5a6a;--r:8px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;user-select:none;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:var(--bg);padding:20px;gap:16px;overflow-y:auto;}
.screen.active{display:flex;}

/* ── SHARED COMPONENTS ── */
.logo{font-size:clamp(2rem,8vw,3.2rem);font-weight:900;letter-spacing:.03em;color:var(--gold);text-shadow:0 0 60px #c8a96e33;}
.logo em{color:var(--text);font-style:normal;}
.sub{color:var(--muted);font-size:.82rem;text-align:center;}
.card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:18px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:9px;}
.card-title{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);}
input[type=text],input[type=password],input[type=number]{background:var(--bg);border:1px solid var(--bord);border-radius:var(--r);color:var(--text);padding:10px 13px;font-size:.92rem;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;font-family:inherit;}
input:focus{border-color:var(--gold);}
.btn{cursor:pointer;border:none;border-radius:var(--r);padding:10px 14px;font-size:.86rem;font-weight:700;font-family:inherit;transition:transform .1s,opacity .15s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);color:#0d0f14;}
.btn-outline{background:transparent;border:1px solid var(--bord);color:var(--text);}
.btn-red{background:var(--red);color:#fff;}
.btn-sm{padding:6px 12px;font-size:.78rem;width:auto;}
.err{color:var(--red);font-size:.76rem;min-height:14px;}
.link-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-size:.8rem;font-family:inherit;padding:0;text-decoration:underline;}

/* ── AUTH SCREEN ── */
#auth-tabs{display:flex;gap:0;width:100%;max-width:400px;}
.auth-tab{flex:1;padding:9px;background:var(--surf);border:1px solid var(--bord);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;}
.auth-tab:first-child{border-radius:var(--r) 0 0 var(--r);}
.auth-tab:last-child{border-radius:0 var(--r) var(--r) 0;border-left:none;}
.auth-tab.on{background:#c8a96e22;border-color:var(--gold);color:var(--gold);}
#auth-join-section{display:flex;flex-direction:column;gap:9px;width:100%;max-width:400px;}

/* ── DASHBOARD ── */
#dashboard{overflow-y:auto;}
#dash-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:600px;margin-bottom:4px;}
#dash-header h2{font-size:1rem;font-weight:700;color:var(--gold);}
#dash-username{font-size:.78rem;color:var(--muted);}
.campaign-list{width:100%;max-width:600px;display:flex;flex-direction:column;gap:8px;}
.camp-card{background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;}
.camp-card:hover{border-color:var(--gold);}
.camp-icon{font-size:1.4rem;flex-shrink:0;}
.camp-info{flex:1;}
.camp-name{font-size:.9rem;font-weight:600;}
.camp-meta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.camp-actions{display:flex;gap:6px;flex-shrink:0;}
.camp-btn{background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--muted);padding:5px 9px;font-size:.7rem;cursor:pointer;font-family:inherit;}
.camp-btn:hover{border-color:var(--gold);color:var(--gold);}
.camp-btn.red:hover{border-color:var(--red);color:var(--red);}
.new-camp{background:var(--surf2);border:1px dashed var(--bord);border-radius:var(--r);padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--muted);font-size:.85rem;width:100%;max-width:600px;transition:border-color .15s;font-family:inherit;}
.new-camp:hover{border-color:var(--gold);color:var(--gold);}
.camp-join-section{width:100%;max-width:600px;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;}

/* ── SPINNER ── */
#connecting{position:fixed;inset:0;background:#0d0f14ee;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:30;}
.spin{width:30px;height:30px;border:3px solid var(--bord);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── GAME ── */
#game{position:fixed;inset:0;display:none;flex-direction:column;}
#topbar{background:var(--surf);border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:5px;padding:6px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#topbar::-webkit-scrollbar{display:none;}
.logo-sm{font-weight:900;color:var(--gold);font-size:.9rem;white-space:nowrap;flex-shrink:0;}
.sep{color:var(--bord);flex-shrink:0;padding:0 2px;}
#code-badge{background:var(--bg);border:1px solid var(--bord);border-radius:4px;padding:3px 9px;font-size:.72rem;font-family:monospace;color:var(--gold);letter-spacing:.12em;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.tbtn{background:var(--bg);border:1px solid var(--bord);color:var(--muted);border-radius:var(--r);padding:5px 9px;font-size:.7rem;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;line-height:1.2;}
.tbtn.on{border-color:var(--gold);color:var(--gold);background:#c8a96e11;}
.tbtn:active{transform:scale(.95);}
.tbtn.danger{color:var(--red);}
.zoom-grp{display:flex;flex-shrink:0;}
.zoom-grp .tbtn{border-radius:0;border-right-width:0;}
.zoom-grp .tbtn:first-child{border-radius:var(--r) 0 0 var(--r);}
.zoom-grp .tbtn:last-child{border-radius:0 var(--r) var(--r) 0;border-right-width:1px;}
#zoom-lbl{background:var(--bg);border:1px solid var(--bord);border-right-width:0;color:var(--muted);padding:5px 7px;font-size:.68rem;white-space:nowrap;font-family:monospace;}
#mj-controls{display:none;align-items:center;gap:5px;}

/* Canvas */
#wrap{flex:1;position:relative;overflow:hidden;background:#09090e;}
canvas{display:block;position:absolute;top:0;left:0;}
#c-grid{pointer-events:none;}
#hover-info{position:absolute;bottom:58px;left:10px;background:#161a24cc;backdrop-filter:blur(6px);border:1px solid var(--bord);border-radius:6px;padding:4px 9px;font-size:.7rem;color:var(--muted);pointer-events:none;opacity:0;transition:opacity .2s;}
#hover-info.show{opacity:1;}
#minimap{position:absolute;bottom:8px;right:8px;width:130px;height:84px;border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;background:#09090e;}
#minimap canvas{width:100%;height:100%;}
#mm-vp{position:absolute;border:1px solid var(--gold);border-radius:2px;pointer-events:none;opacity:.7;}
#btn-reset{position:absolute;bottom:8px;left:10px;background:#161a24cc;backdrop-filter:blur(6px);border:1px solid var(--bord);border-radius:var(--r);color:var(--muted);font-size:.72rem;padding:4px 9px;cursor:pointer;font-family:inherit;}
#colors{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:#161a24dd;backdrop-filter:blur(8px);border:1px solid var(--bord);border-radius:40px;padding:6px 12px;}
.swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.swatch.on{border-color:#fff;transform:scale(1.3);}
#players-panel{position:absolute;top:8px;right:8px;background:#161a24cc;backdrop-filter:blur(6px);border:1px solid var(--bord);border-radius:var(--r);padding:9px 11px;font-size:.7rem;min-width:105px;}
#players-panel h3{color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-size:.6rem;margin-bottom:5px;}
.prow{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#dist-label{position:absolute;background:#0d0f14cc;border:1px solid var(--gold);border-radius:4px;padding:2px 8px;font-size:.72rem;color:var(--gold);pointer-events:none;display:none;white-space:nowrap;}
#current-turn-banner{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#c8a96e;color:#0d0f14;border-radius:20px;padding:5px 16px;font-size:.78rem;font-weight:700;z-index:5;white-space:nowrap;}

/* Side panels */
.side-panel{position:absolute;top:0;right:0;width:280px;height:100%;background:var(--surf);border-left:1px solid var(--bord);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;z-index:10;}
.side-panel.open{transform:translateX(0);}
.sp-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bord);flex-shrink:0;}
.sp-header h2{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);}
.sp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0;}
.sp-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;}

/* Initiative */
.init-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--bord);border-radius:6px;margin-bottom:6px;background:var(--bg);}
.init-row.active-turn{border-color:var(--gold);background:#c8a96e0a;}
.init-val{font-size:1.1rem;font-weight:800;color:var(--gold);width:28px;text-align:center;flex-shrink:0;}
.init-name{flex:1;font-size:.8rem;}
.init-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0;}
.init-add{display:flex;gap:6px;margin-top:8px;}
.init-add input{flex:1;background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);padding:6px 9px;font-size:.8rem;outline:none;font-family:inherit;}
.init-add input:focus{border-color:var(--gold);}
.init-add button{background:var(--gold);color:#0d0f14;border:none;border-radius:6px;padding:6px 10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.8rem;}
#init-next{width:100%;margin-top:10px;background:var(--surf2);border:1px solid var(--bord);border-radius:6px;color:var(--text);padding:8px;font-size:.8rem;cursor:pointer;font-family:inherit;}
#init-next:hover{border-color:var(--gold);color:var(--gold);}

/* Obstacle bank */
#obs-panel .sp-body{padding:10px;}
.obs-cat-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin:10px 0 6px;}
.obs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
.obs-item{background:var(--bg);border:1px solid var(--bord);border-radius:6px;padding:6px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;}
.obs-item:hover,.obs-item.sel{border-color:var(--gold);background:#c8a96e11;}
.obs-item svg{width:32px;height:32px;}
.obs-item span{font-size:.58rem;color:var(--muted);text-align:center;line-height:1.2;}
.obs-sep{border:none;border-top:1px solid var(--bord);margin:8px 0;}
#obs-clear{width:100%;margin-top:6px;background:transparent;border:1px solid var(--bord);border-radius:6px;color:var(--red);padding:7px;font-size:.78rem;cursor:pointer;font-family:inherit;}

/* Obstacle popup */
#obs-popup{position:fixed;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:14px;display:none;z-index:50;width:min(230px,96vw);box-shadow:0 8px 40px #00000099;}
@media(max-width:540px){
  #obs-popup{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:16px 16px 0 0;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
}
.obs-popup-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.obs-popup-row label{font-size:.7rem;color:var(--muted);width:54px;flex-shrink:0;}
.obs-popup-row input[type=range]{flex:1;accent-color:var(--gold);cursor:pointer;}
.obs-popup-row span{font-size:.72rem;color:var(--text);width:32px;text-align:right;flex-shrink:0;}
.obs-popup-btns{display:flex;gap:6px;margin-top:4px;}
.obs-popup-btns button{flex:1;background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);padding:6px;font-size:.72rem;cursor:pointer;font-family:inherit;}
.obs-popup-btns button:hover{border-color:var(--gold);color:var(--gold);}
.obs-popup-btns button.del{color:var(--red);}
.obs-popup-btns button.del:hover{border-color:var(--red);}
@media(max-width:500px){
  #obs-popup{position:fixed!important;left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:14px 14px 0 0;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
}
#token-popup{position:fixed;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:14px;display:none;z-index:50;width:min(300px,96vw);box-shadow:0 8px 40px #00000099;max-height:90dvh;overflow-y:auto;}
@media(max-width:540px){
  #token-popup{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:16px 16px 0 0;max-height:82dvh;padding-bottom:calc(16px + env(safe-area-inset-bottom));}
}
#token-popup h4{color:var(--gold);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-right:20px;}
.tp-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;}
.tp-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:8px;}
.tp-row label{font-size:.7rem;color:var(--muted);width:56px;flex-shrink:0;padding-top:2px;}
.tp-row input,.tp-row textarea,.tp-row select{flex:1;background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);padding:5px 8px;font-size:.8rem;outline:none;font-family:inherit;}
.tp-row textarea{resize:none;height:48px;}
.tp-row select{cursor:pointer;}
.tp-row input:focus,.tp-row textarea:focus,.tp-row select:focus{border-color:var(--gold);}
.hp-pair{display:flex;gap:4px;align-items:center;flex:1;}
.hp-pair input{width:44px;text-align:center;}
.hp-sep{color:var(--muted);}
.tp-section{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:10px 0 6px;}

/* Conditions grid */
.cond-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.cond-btn{background:var(--bg);border:1px solid var(--bord);border-radius:20px;padding:3px 8px;font-size:.68rem;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:4px;}
.cond-btn.on{border-color:currentColor;color:var(--text);}
.cond-btn[data-color="red"].on{color:var(--red);border-color:var(--red);background:#e0525218;}
.cond-btn[data-color="blue"].on{color:var(--blue);border-color:var(--blue);background:#5c7cff18;}
.cond-btn[data-color="purple"].on{color:var(--purple);border-color:var(--purple);background:#c878f018;}
.cond-btn[data-color="gold"].on{color:var(--gold);border-color:var(--gold);background:#c8a96e18;}
.cond-btn[data-color="green"].on{color:var(--green);border-color:var(--green);background:#52c97a18;}
.cond-btn[data-color="muted"].on{color:#aaa;border-color:#aaa;background:#aaaaaa18;}

#tp-save{width:100%;background:var(--gold);color:#0d0f14;border:none;border-radius:6px;padding:7px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.82rem;margin-top:4px;}

/* Range popup */
#range-popup{position:fixed;background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:14px;display:none;z-index:50;width:min(230px,96vw);box-shadow:0 8px 40px #00000099;}
@media(max-width:540px){
  #range-popup{left:0!important;right:0!important;bottom:0!important;top:auto!important;width:100%!important;border-radius:16px 16px 0 0;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
}
#range-popup h4{color:var(--gold);font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
.range-colors{display:flex;gap:5px;align-items:center;margin-bottom:9px;}
.range-colors span{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.rc-sw{width:19px;height:19px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0;}
.rc-sw.on{border-color:#fff;transform:scale(1.25);}
.rp-presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.rp-btn{background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);font-size:.72rem;padding:4px 9px;cursor:pointer;font-family:inherit;}
.rp-btn:active{border-color:var(--gold);color:var(--gold);}
.rp-custom{display:flex;gap:6px;align-items:center;}
.rp-custom input{background:var(--bg);border:1px solid var(--bord);border-radius:6px;color:var(--text);padding:5px 9px;font-size:.82rem;width:68px;outline:none;font-family:inherit;}
.rp-custom button{background:var(--gold);color:#0d0f14;border:none;border-radius:6px;padding:5px 11px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.78rem;}
.popup-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;}

/* ── DICE PANEL (refonte) ── */
#dice-panel{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  background:#161a24f0;backdrop-filter:blur(10px);
  border:1px solid var(--bord);border-radius:14px 14px 0 0;
  padding:14px 16px 20px;display:none;z-index:40;
  width:min(400px,100vw);
  box-shadow:0 -4px 24px #00000066;
}
.dice-handle{width:36px;height:4px;background:var(--bord);border-radius:2px;margin:0 auto 12px;}
.dice-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px;text-align:center;}
.dice-faces{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px;}
.d-btn{
  background:var(--surf2);border:1px solid var(--bord);border-radius:8px;
  color:var(--text);font-size:.78rem;font-weight:700;padding:10px 4px;
  cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.d-btn .d-icon{font-size:1.1rem;line-height:1;}
.d-btn:active{border-color:var(--gold);color:var(--gold);transform:scale(.93);background:#c8a96e18;}
.dice-custom-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.dice-custom-row input{flex:1;background:var(--bg);border:1px solid var(--bord);border-radius:8px;
  color:var(--text);padding:8px 10px;font-size:.85rem;text-align:center;outline:none;font-family:inherit;}
.dice-custom-row input:focus{border-color:var(--gold);}
.dice-custom-row .d-sep{color:var(--muted);font-size:.9rem;font-weight:700;flex-shrink:0;}
.dice-custom-row button{background:var(--gold);color:#0d0f14;border:none;border-radius:8px;
  padding:8px 14px;font-weight:800;cursor:pointer;font-family:inherit;font-size:.82rem;flex-shrink:0;}
#dice-log{max-height:130px;overflow-y:auto;border-top:1px solid var(--bord);padding-top:8px;scrollbar-width:thin;}
.dice-entry{
  display:flex;align-items:baseline;gap:6px;
  padding:5px 8px;border-radius:6px;margin-bottom:4px;
  background:var(--bg);border:1px solid transparent;
  font-size:.75rem;
}
.dice-entry.mine{border-color:var(--bord);}
.dice-entry .de-name{color:var(--muted);flex-shrink:0;}
.dice-entry .de-dice{color:var(--text);flex-shrink:0;}
.dice-entry .de-result{color:var(--gold);font-weight:800;font-size:.95rem;margin-left:auto;flex-shrink:0;}
.dice-entry .de-rolls{color:var(--muted);font-size:.68rem;}

/* Condition badges on map */
.cond-badge{position:absolute;pointer-events:none;}

/* Toast */
#toast{position:fixed;bottom:62px;left:50%;transform:translateX(-50%);background:var(--surf);border:1px solid var(--bord);border-radius:var(--r);padding:6px 15px;font-size:.76rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="screen active" id="auth-screen">
  <div class="logo">Battle<em>map</em></div>

let authMode="login";
function showAuthTab(mode){
  authMode=mode;
  document.querySelectorAll(".auth-tab").forEach((t,i)=>t.classList.toggle("on",(i===0&&mode==="login")||(i===1&&mode==="register")));
  document.getElementById("auth-form-title").textContent=mode==="login"?"Connexion":"Créer un compte";
  document.getElementById("auth-submit").textContent=mode==="login"?"Se connecter":"S'inscrire";
  document.getElementById("auth-err").textContent="";
}

async function submitAuth(){
  const username=document.getElementById("auth-username").value.trim();
  const password=document.getElementById("auth-password").value;
  if(!username||!password){document.getElementById("auth-err").textContent="Champs requis.";return;}
  const res=await fetch(`/api/${authMode}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
  const data=await res.json();
  if(!res.ok){document.getElementById("auth-err").textContent=data.error||"Erreur";return;}
  authToken=data.token; authUser={username:data.username,userId:data.userId};
  localStorage.setItem("bm_token",authToken);
  showDashboard();
}

async function logout(){
  if(authToken)await fetch("/api/logout",{method:"POST",headers:{Authorization:`Bearer ${authToken}`}});
  authToken=null; authUser=null; localStorage.removeItem("bm_token");
  showScreen("auth-screen");
}

// ════════════════════════════════════════
// WEBSOCKET
// ════════════════════════════════════════
let _heartbeatTimer=null;

function connectWS(cb){
  const proto=location.protocol==="https:"?"wss":"ws";
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{
    // Heartbeat côté client : répond au ping serveur (géré automatiquement par le browser)
    // + envoie un ping applicatif toutes les 25s pour garder la connexion vivante
    clearInterval(_heartbeatTimer);
    _heartbeatTimer=setInterval(()=>{
      if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"PING_KEEPALIVE"}));
    },25000);
    cb();
  };
  ws.onmessage=e=>{
    // Ignorer les messages non-JSON (pong binaire)
    if(typeof e.data!=="string")return;
    handleMsg(JSON.parse(e.data));
  };
  ws.onclose=()=>{
    clearInterval(_heartbeatTimer);
    if(document.getElementById("game").style.display!=="none"){
      toast("Connexion perdue — reconnexion…");
      // Backoff exponentiel : 1.5s, 3s, 6s max
      const delay=Math.min(6000,1500*Math.pow(2,_reconnectAttempts));
      _reconnectAttempts++;
      setTimeout(()=>autoReconnect(),delay);
    }
  };
  ws.onerror=()=>{}; // le onclose s'en charge
}
let _reconnectAttempts=0;
function autoReconnect(){
  if(!lobbyCode)return;
  if(isMJ&&authToken){
    connectWS(()=>send({type:"JOIN_CAMPAIGN",token:authToken,lobbyCode}));
  } else {
    connectWS(()=>send({type:"JOIN_LOBBY",code:lobbyCode,userId:myId,name:myName}));
  }
}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
function startConnecting(){document.getElementById("connecting").style.display="flex";}
function stopConnecting(){document.getElementById("connecting").style.display="none";_reconnectAttempts=0;}

// ════════════════════════════════════════
// MESSAGES
// ════════════════════════════════════════
function handleMsg(msg){
  switch(msg.type){
    case "LOBBY_JOINED":
      stopConnecting();
      myId=msg.userId; lobbyCode=msg.code;
      if(msg.isMJ)isMJ=true;
      applyState(msg.state); enterGame(); break;
    case "KICKED":
      // On est éjecté car reconnexion depuis un autre onglet — ignorer silencieusement
      break;
    case "ERROR":
      stopConnecting();
      document.getElementById("join-err")&&(document.getElementById("join-err").textContent=msg.message);
      document.getElementById("guest-err")&&(document.getElementById("guest-err").textContent=msg.message);
      document.getElementById("dash-join-err")&&(document.getElementById("dash-join-err").textContent=msg.message);
      toast(msg.message); break;
    case "SET_TOKEN":{
      const t=msg.token;
      tokens[t.tokenId]={...t,id:t.tokenId,ranges:t.ranges||[],notes:t.notes||"",
        hp:t.hp??null,maxHp:t.maxHp??null,size:t.size||"Medium",sizeN:t.sizeN||1,conditions:t.conditions||[]};
      drawAll();break;}
    case "DELETE_TOKEN": delete tokens[msg.tokenId]; drawAll(); break;
    case "SET_RANGES": if(tokens[msg.tokenId])tokens[msg.tokenId].ranges=msg.ranges; drawAll(); break;
    case "SET_DRAWING": drawings[msg.drawing.drawId]=msg.drawing; drawAll(); break;
    case "DELETE_DRAWING": delete drawings[msg.drawId]; drawAll(); break;
    case "CLEAR_DRAWINGS": drawings={}; drawAll(); break;
    case "SET_OBSTACLE": obstacles[msg.obstacle.obsId]=msg.obstacle; drawAll(); break;
    case "DELETE_OBSTACLE": delete obstacles[msg.obsId]; drawAll(); break;
    case "CLEAR_OBSTACLES": obstacles={}; drawAll(); break;
    case "SET_INITIATIVES": initiatives=msg.initiatives; renderInitiatives(); break;
    case "PING": pings.push({x:msg.x,y:msg.y,color:msg.color,born:Date.now()}); animatePings(); break;
    case "DICE_ROLL": addDiceLog(msg); break;
    case "SET_IMAGE": bgUrl=msg.imageUrl; loadBg(bgUrl); break;
    case "CLEAR_ALL": tokens={}; drawings={}; obstacles={}; initiatives=[]; renderInitiatives(); drawAll(); break;
    case "PLAYER_UPDATE": playerIds=msg.playerIds; playerNames=msg.playerNames; updatePlayers(); break;
    case "HOST_CHANGED":
      hostId=msg.newHostId;
      if(msg.newHostId===myId){isMJ=true;showMJControls();toast("Tu es maintenant MJ !");}
      updatePlayers(); break;
  }
}

function applyState(s){
  hostId=s.hostId; playerIds=s.playerIds||[]; playerNames=s.playerNames||{};
  bgUrl=s.imageUrl||"";
  const rawInit=s.initiatives||[];
  initiatives=Array.isArray(rawInit)?rawInit:Object.values(rawInit);
  currentTurn=0;
  tokens={}; for(const[id,t]of Object.entries(s.tokens||{}))
    tokens[id]={...t,id:t.tokenId||id,ranges:t.ranges||[],notes:t.notes||"",
      hp:t.hp??null,maxHp:t.maxHp??null,size:t.size||"Medium",sizeN:t.sizeN||1,conditions:t.conditions||[]};
  drawings={}; for(const[id,d]of Object.entries(s.drawings||{}))drawings[id]=d;
  obstacles={}; for(const[id,o]of Object.entries(s.obstacles||{}))obstacles[id]=o;
  if(bgUrl)loadBg(bgUrl);
}

function w2s(mx,my){return{x:mx*CELL*scale+ox,y:my*CELL*scale+oy};}
function s2w(sx,sy){return{x:(sx-ox)/(CELL*scale),y:(sy-oy)/(CELL*scale)};}
function snap(v){return Math.round(v*2)/2;}
function evXY(e){
  const r=cMain.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
  return{sx:s.clientX-r.left,sy:s.clientY-r.top};
}
function tokenSizePx(t){
  const n=t.sizeN||DND_SIZES[t.size||"Medium"]?.n||1;
  return n*CELL*scale;
}

// DRAW
// ════════════════════════════════════════
function drawAll(){drawGrid();drawMain();drawMini();
  document.getElementById("zoom-lbl").textContent=Math.round(scale*100)+"%";}

function drawGrid(){
  const W=cGrid.width,H=cGrid.height;
  gCtx.clearRect(0,0,W,H);
  if(bgImg){gCtx.drawImage(bgImg,ox,oy,bgImg.naturalWidth*scale,bgImg.naturalHeight*scale);}
  else{gCtx.fillStyle="#0e1018";gCtx.fillRect(0,0,W,H);}
  if(!showGrid)return;
  const step=CELL*scale; if(step<4)return;
  const sx0=(ox%step+step)%step,sy0=(oy%step+step)%step;
  gCtx.strokeStyle="#1e2232";gCtx.lineWidth=0.6;gCtx.beginPath();
  for(let x=sx0;x<W;x+=step){gCtx.moveTo(x,0);gCtx.lineTo(x,H);}
  for(let y=sy0;y<H;y+=step){gCtx.moveTo(0,y);gCtx.lineTo(W,y);}
  gCtx.stroke();
  const s5=step*5;
  if(s5>8){const sx5=(ox%s5+s5)%s5,sy5=(oy%s5+s5)%s5;
    gCtx.strokeStyle="#2a3050";gCtx.lineWidth=1;gCtx.beginPath();
    for(let x=sx5;x<W;x+=s5){gCtx.moveTo(x,0);gCtx.lineTo(x,H);}
    for(let y=sy5;y<H;y+=s5){gCtx.moveTo(0,y);gCtx.lineTo(W,y);}
    gCtx.stroke();}
  if(tool!=="pan"){
    const sp=w2s(Math.floor(hoverCell.x),Math.floor(hoverCell.y));
    gCtx.fillStyle="#c8a96e0a";gCtx.strokeStyle="#c8a96e33";gCtx.lineWidth=1;
    gCtx.fillRect(sp.x,sp.y,step,step);gCtx.strokeRect(sp.x,sp.y,step,step);}
}

const _svgCache={};
function getObsSvgImg(def,cb){
  if(_svgCache[def.type]){cb(_svgCache[def.type]);return;}
  const blob=new Blob([`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">${def.svg}</svg>`],{type:"image/svg+xml"});
  const img=new Image();
  img.onload=()=>{_svgCache[def.type]=img;cb(img);};
  img.src=URL.createObjectURL(blob);
}
function getObsDef(type){for(const c of OBS_BANK)for(const i of c.items)if(i.type===type)return i;return null;}

function drawMain(){
  const W=cMain.width,H=cMain.height;
  mCtx.clearRect(0,0,W,H);

  // Obstacles
  for(const o of Object.values(obstacles)){
    const def=getObsDef(o.obsType);if(!def)continue;
    const sp=w2s(o.x,o.y);
    const pw=def.w*CELL*scale*(o.scale||1),ph=def.h*CELL*scale*(o.scale||1);
    const isSel=selectedObs===o.obsId;
    getObsSvgImg(def,img=>{
      mCtx.save();mCtx.translate(sp.x+pw/2,sp.y+ph/2);
      if(o.rotation)mCtx.rotate(o.rotation*Math.PI/180);
      if(o.flipX)mCtx.scale(-1,1);
      if(isSel){mCtx.shadowColor="#c8a96e";mCtx.shadowBlur=16;}
      mCtx.drawImage(img,-pw/2,-ph/2,pw,ph);
      mCtx.shadowBlur=0;
      if(isSel){
        mCtx.strokeStyle="#c8a96e";mCtx.lineWidth=2;mCtx.setLineDash([4,3]);
        mCtx.strokeRect(-pw/2-2,-ph/2-2,pw+4,ph+4);mCtx.setLineDash([]);
        // resize handle corner
        mCtx.fillStyle="#c8a96e";mCtx.fillRect(pw/2-5,ph/2-5,10,10);
      }
      mCtx.restore();
    });
  }

  // Drawings
  for(const d of Object.values(drawings)){
    mCtx.save();mCtx.strokeStyle=d.color;mCtx.lineWidth=d.width||2;mCtx.lineCap="round";mCtx.lineJoin="round";
    if(d.drawType==="free"&&d.points.length>1){
      mCtx.beginPath();const p0=w2s(d.points[0][0],d.points[0][1]);mCtx.moveTo(p0.x,p0.y);
      for(let i=1;i<d.points.length;i++){const p=w2s(d.points[i][0],d.points[i][1]);mCtx.lineTo(p.x,p.y);}
      mCtx.stroke();
    } else if(d.drawType==="line"&&d.points.length>=2){
      const a=w2s(d.points[0][0],d.points[0][1]),b=w2s(d.points[1][0],d.points[1][1]);
      mCtx.beginPath();mCtx.moveTo(a.x,a.y);mCtx.lineTo(b.x,b.y);mCtx.stroke();
    } else if(d.drawType==="rect"&&d.points.length>=2){
      const a=w2s(d.points[0][0],d.points[0][1]),b=w2s(d.points[1][0],d.points[1][1]);
      mCtx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);
    } else if(d.drawType==="arrow"&&d.points.length>=2){
      const a=w2s(d.points[0][0],d.points[0][1]),b=w2s(d.points[1][0],d.points[1][1]);
      drawArrow(mCtx,a.x,a.y,b.x,b.y,d.color,d.width||2);
    }
    mCtx.restore();
  }

  // Range circles
  for(const t of Object.values(tokens)){
    if(!t.ranges?.length)continue;
    const sp=w2s(t.x,t.y);
    const sz=t.sizeN||DND_SIZES[t.size||"Medium"]?.n||1;
    const cx=sp.x+sz*CELL*scale/2,cy=sp.y+sz*CELL*scale/2;
    for(const rng of t.ranges){
      const rpx=rng.r*CELL*scale,col=rng.color;
      mCtx.beginPath();mCtx.arc(cx,cy,rpx,0,Math.PI*2);
      mCtx.fillStyle=col+"12";mCtx.fill();
      mCtx.beginPath();mCtx.arc(cx,cy,rpx,0,Math.PI*2);
      mCtx.strokeStyle=col;mCtx.lineWidth=2;mCtx.setLineDash([]);mCtx.stroke();
      mCtx.beginPath();mCtx.arc(cx,cy,rpx-3,0,Math.PI*2);
      mCtx.strokeStyle=col+"30";mCtx.lineWidth=2;mCtx.stroke();
      if(rpx>18){
        const lx=cx,ly=cy-rpx,lbl=`${rng.r}m`;
        const fs=Math.max(9,Math.round(10*Math.min(1,scale)));
        mCtx.font=`bold ${fs}px sans-serif`;
        const tw=mCtx.measureText(lbl).width;
        mCtx.fillStyle="#0d0f14cc";mCtx.beginPath();mCtx.roundRect(lx-tw/2-4,ly-fs/2-2,tw+8,fs+4,3);mCtx.fill();
        mCtx.strokeStyle=col;mCtx.lineWidth=1;mCtx.stroke();
        mCtx.fillStyle=col;mCtx.textAlign="center";mCtx.textBaseline="middle";mCtx.fillText(lbl,lx,ly);
      }
    }
  }

  // Tokens
  for(const t of Object.values(tokens)){
    const sz=t.sizeN||DND_SIZES[t.size||"Medium"]?.n||1;
    const spx=w2s(t.x,t.y);
    const pw=sz*CELL*scale, ph=sz*CELL*scale;
    const cx=spx.x+pw/2, cy=spx.y+ph/2;
    const r=Math.min(pw/2*0.85, TR*Math.max(0.4,Math.min(1.5,scale)));
    const mine=t.userId===myId;
    const isActive=initiatives.length>0&&initiatives[currentTurn]?.tokenId===t.id;

    // Size footprint for large+ creatures — filled + outlined square
    if(sz>1){
      // coloured fill so footprint is clearly visible
      mCtx.fillStyle=t.color+"18";
      mCtx.fillRect(spx.x+1,spx.y+1,pw-2,ph-2);
      mCtx.strokeStyle=t.color+"99";
      mCtx.lineWidth=2;mCtx.setLineDash([]);
      mCtx.strokeRect(spx.x+1,spx.y+1,pw-2,ph-2);
      // corner dots
      [[spx.x,spx.y],[spx.x+pw,spx.y],[spx.x,spx.y+ph],[spx.x+pw,spx.y+ph]].forEach(([dx,dy])=>{
        mCtx.beginPath();mCtx.arc(dx,dy,3,0,Math.PI*2);
        mCtx.fillStyle=t.color+"cc";mCtx.fill();
      });
      // size label centered in the footprint (below token circle)
      const szLabel=t.size==="Custom"?`${sz}×${sz}`:t.size||"";
      if(szLabel&&pw>24){
        const fs=Math.max(8,Math.round(11*Math.min(1,scale)));
        mCtx.font=`600 ${fs}px sans-serif`;
        const tw=mCtx.measureText(szLabel).width;
        mCtx.fillStyle="#0d0f14bb";
        mCtx.fillRect(cx-tw/2-3,spx.y+ph-fs-6,tw+6,fs+4);
        mCtx.fillStyle=t.color;
        mCtx.textAlign="center";mCtx.textBaseline="bottom";
        mCtx.fillText(szLabel,cx,spx.y+ph-3);
      }
    }

    mCtx.shadowColor=t.color+(isActive?"ff":"88");mCtx.shadowBlur=isActive?20:mine?12:4;
    mCtx.beginPath();mCtx.arc(cx,cy,r,0,Math.PI*2);
    mCtx.fillStyle=t.color;mCtx.fill();mCtx.shadowBlur=0;
    mCtx.strokeStyle=isActive?"#fff":mine?"#ffffffaa":"#00000044";
    mCtx.lineWidth=isActive?3:mine?2:1.5;mCtx.stroke();
    if(isActive){mCtx.beginPath();mCtx.arc(cx,cy,r+5,0,Math.PI*2);mCtx.strokeStyle="#c8a96e88";mCtx.lineWidth=2;mCtx.stroke();}

    // Label
    if(r>7&&t.label){
      mCtx.fillStyle="#fff";mCtx.font=`bold ${Math.round(r*.82)}px sans-serif`;
      mCtx.textAlign="center";mCtx.textBaseline="middle";
      mCtx.shadowColor="#00000077";mCtx.shadowBlur=3;
      mCtx.fillText(t.label.charAt(0).toUpperCase(),cx,cy);mCtx.shadowBlur=0;
    }

    // HP bar
    if(t.hp!==null&&t.maxHp&&t.maxHp>0&&r>8){
      const bw=pw*.9,bh=5,bx=cx-bw/2,by=cy+r+4;
      mCtx.fillStyle="#0d0f14aa";mCtx.fillRect(bx,by,bw,bh);
      const pct=Math.max(0,Math.min(1,t.hp/t.maxHp));
      mCtx.fillStyle=pct>0.5?"#52c97a":pct>0.25?"#f4c430":"#e05252";
      mCtx.fillRect(bx,by,bw*pct,bh);
      mCtx.strokeStyle="#00000066";mCtx.lineWidth=0.5;mCtx.strokeRect(bx,by,bw,bh);
      // hp text
      if(bw>30){
        const fs=Math.max(7,Math.round(8*Math.min(1,scale)));
        mCtx.font=`${fs}px sans-serif`;mCtx.fillStyle="#fff";
        mCtx.textAlign="center";mCtx.textBaseline="middle";
        mCtx.fillText(`${t.hp}/${t.maxHp}`,cx,by+bh/2);
      }
    }

    // Conditions icons
    if(t.conditions?.length&&r>6){
      const iconSize=Math.max(10,Math.round(14*Math.min(1,scale)));
      t.conditions.slice(0,6).forEach((cid,i)=>{
        const cdef=DND_CONDITIONS.find(c=>c.id===cid);if(!cdef)return;
        const ix=spx.x+i*(iconSize+2);const iy=spx.y-iconSize-3;
        // small dark bg behind each icon
        mCtx.fillStyle="#0d0f14aa";
        mCtx.fillRect(ix-1,iy-1,iconSize+2,iconSize+2);
        mCtx.font=`${iconSize}px sans-serif`;
        mCtx.textAlign="left";mCtx.textBaseline="top";
        mCtx.fillText(cdef.icon,ix,iy);
      });
    }
  }

  // Ruler
  if(rulerStart&&rulerEnd){
    const a=w2s(rulerStart.x,rulerStart.y),b=w2s(rulerEnd.x,rulerEnd.y);
    mCtx.setLineDash([6,4]);mCtx.strokeStyle="#f4c430";mCtx.lineWidth=2;
    mCtx.beginPath();mCtx.moveTo(a.x,a.y);mCtx.lineTo(b.x,b.y);mCtx.stroke();mCtx.setLineDash([]);
    [a,b].forEach(p=>{mCtx.beginPath();mCtx.arc(p.x,p.y,4,0,Math.PI*2);mCtx.fillStyle="#f4c430";mCtx.fill();});
    const dist=Math.hypot(rulerEnd.x-rulerStart.x,rulerEnd.y-rulerStart.y);
    const dl=document.getElementById("dist-label");
    dl.style.display="block";dl.style.left=((a.x+b.x)/2+8)+"px";dl.style.top=((a.y+b.y)/2-12)+"px";
    dl.textContent=dist.toFixed(1)+" m";
  } else document.getElementById("dist-label").style.display="none";

  // Pings
  const now=Date.now();pings=pings.filter(p=>now-p.born<2200);
  for(const p of pings){
    const sp=w2s(p.x,p.y),age=(now-p.born)/2200;
    mCtx.beginPath();mCtx.arc(sp.x,sp.y,(1-age)*28*scale,0,Math.PI*2);
    mCtx.strokeStyle=p.color+(Math.floor((1-age)*99).toString(16).padStart(2,"0"));mCtx.lineWidth=2;mCtx.stroke();
    mCtx.beginPath();mCtx.arc(sp.x,sp.y,(1-age)*16*scale,0,Math.PI*2);
    mCtx.fillStyle=p.color+(Math.floor((1-age)*80).toString(16).padStart(2,"0"));mCtx.fill();
  }
}

function drawArrow(ctx,x1,y1,x2,y2,color,w){
  const angle=Math.atan2(y2-y1,x2-x1),len=12+w*2;
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.fillStyle=color;ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-len*Math.cos(angle-0.4),y2-len*Math.sin(angle-0.4));
  ctx.lineTo(x2-len*Math.cos(angle+0.4),y2-len*Math.sin(angle+0.4));
  ctx.closePath();ctx.fill();
}

function drawMini(){
  const MW=cMini.width,MH=cMini.height,WW=40,WH=25,sm=Math.min(MW/WW,MH/WH);
  miniCtx.clearRect(0,0,MW,MH);miniCtx.fillStyle="#0e1018";miniCtx.fillRect(0,0,MW,MH);
  miniCtx.strokeStyle="#1e2232";miniCtx.lineWidth=0.5;
  for(let x=0;x<=WW;x+=5){miniCtx.beginPath();miniCtx.moveTo(x*sm,0);miniCtx.lineTo(x*sm,MH);miniCtx.stroke();}
  for(let y=0;y<=WH;y+=5){miniCtx.beginPath();miniCtx.moveTo(0,y*sm);miniCtx.lineTo(MW,y*sm);miniCtx.stroke();}
  for(const t of Object.values(tokens)){
    const sz=t.sizeN||DND_SIZES[t.size||"Medium"]?.n||1;
    miniCtx.beginPath();miniCtx.arc((t.x+sz/2)*sm,(t.y+sz/2)*sm,Math.max(2,sz*sm/2),0,Math.PI*2);
    miniCtx.fillStyle=t.color;miniCtx.fill();
  }
  const W=cMain.width,H=cMain.height;
  const vx=-ox/(CELL*scale),vy=-oy/(CELL*scale),vw=W/(CELL*scale),vh=H/(CELL*scale);
  const mmR=document.getElementById("minimap").getBoundingClientRect();
  const vp=document.getElementById("mm-vp");
  vp.style.left=Math.max(0,vx*sm*mmR.width/MW)+"px";vp.style.top=Math.max(0,vy*sm*mmR.height/MH)+"px";
  vp.style.width=Math.min(mmR.width,vw*sm*mmR.width/MW)+"px";vp.style.height=Math.min(mmR.height,vh*sm*mmR.height/MH)+"px";
}

function zoomBy(f,cx,cy){
  if(cx==null){cx=cMain.width/2;cy=cMain.height/2;}
  const ns=Math.max(.15,Math.min(6,scale*f));
  ox=cx-(cx-ox)*(ns/scale);oy=cy-(cy-oy)*(ns/scale);scale=ns;drawAll();
}
function resetView(){scale=1;ox=cMain.width/2-10*CELL;oy=cMain.height/2-10*CELL;drawAll();}

function tokenAt(wx,wy){
  const arr=Object.values(tokens);
  for(let i=arr.length-1;i>=0;i--){
    const t=arr[i];
    const sz=t.sizeN||DND_SIZES[t.size||"Medium"]?.n||1;
    if(wx>=t.x&&wx<=t.x+sz&&wy>=t.y&&wy<=t.y+sz)return t;
  }
  return null;
}
function obsAt(wx,wy){
  if(!isMJ)return null;
  for(const o of Object.values(obstacles)){
    const def=getObsDef(o.obsType);if(!def)continue;
    if(wx>=o.x&&wx<=o.x+def.w*(o.scale||1)&&wy>=o.y&&wy<=o.y+def.h*(o.scale||1))return o;
  }
  return null;
}

});

cMain.addEventListener("touchstart",e=>{
  if(e.touches.length===2)pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});

function onDown(e){
  // Fermer popups sauf si on clique dedans
  const rp=document.getElementById("range-popup"),tp=document.getElementById("token-popup"),op=document.getElementById("obs-popup");
  if(rp.style.display==="block"&&!rp.contains(e.target))closeRangePopup();
  if(tp.style.display==="block"&&!tp.contains(e.target))closeTokenPopup();
  if(op.style.display==="block"&&!op.contains(e.target)){closeObsPopup();}

  const{sx,sy}=evXY(e),wxy=s2w(sx,sy);

  if(tool==="pan"){
    // En pan, le MJ peut glisser les obstacles avec un appui long (géré par timer)
    // ou cliquer pour sélectionner
    if(isMJ){
      const o=obsAt(wxy.x,wxy.y);
      if(o){
        draggingObs={id:o.obsId,dx:wxy.x-o.x,dy:wxy.y-o.y,moved:false};
        selectedObs=o.obsId; drawAll(); return;
      }
    }
    // Sinon pan normal
    if(selectedObs){closeObsPopup();}
    panning=true;panStart={sx,sy,ox,oy};cMain.style.cursor="grabbing";return;
  }

  if(pendingObsType&&isMJ){
    const def=getObsDef(pendingObsType);
    const obsId="o_"+Date.now();
    const o={obsId,obsType:pendingObsType,x:snap(wxy.x),y:snap(wxy.y),rotation:0,scale:1,flipX:false};
    obstacles[obsId]=o;send({type:"SET_OBSTACLE",...o});drawAll();return;
  }

  if(tool==="token"){
    const hit=tokenAt(wxy.x,wxy.y);
    if(hit){if(hit.userId===myId||isMJ)dragging={id:hit.id,dx:wxy.x-hit.x,dy:wxy.y-hit.y};}
    else{
      const tid="t_"+myId+"_"+Date.now();
      const t={id:tid,tokenId:tid,x:snap(wxy.x),y:snap(wxy.y),color:activeColor,label:myName,
               userId:myId,ranges:[],notes:"",hp:null,maxHp:null,size:"Medium",sizeN:1,conditions:[]};
      tokens[tid]=t;
      send({type:"SET_TOKEN",tokenId:tid,x:t.x,y:t.y,color:activeColor,label:myName,userId:myId,size:"Medium",sizeN:1});
      dragging={id:tid,dx:0,dy:0};drawAll();}
    return;}

  if(tool==="range"){const hit=tokenAt(wxy.x,wxy.y);if(hit)openRangePopup(hit.id,sx,sy);else toast("Clique sur un pion");return;}
  if(tool==="ruler"){rulerStart={x:wxy.x,y:wxy.y};rulerEnd={x:wxy.x,y:wxy.y};return;}
  if(tool==="draw"){
    const did="d_"+myId+"_"+Date.now();drawingActive=did;
    if(drawStyle==="free"){drawPoints=[[wxy.x,wxy.y]];}else{drawShapeStart={x:wxy.x,y:wxy.y};}return;}
  if(tool==="ping"){triggerPing(wxy.x,wxy.y);return;}
  if(tool==="delete"){
    const hit=tokenAt(wxy.x,wxy.y);
    if(hit&&(hit.userId===myId||isMJ)){delete tokens[hit.id];send({type:"DELETE_TOKEN",tokenId:hit.id});drawAll();return;}
    if(isMJ){const o=obsAt(wxy.x,wxy.y);if(o){delete obstacles[o.obsId];send({type:"DELETE_OBSTACLE",obsId:o.obsId});drawAll();return;}}
    for(const[id,d]of Object.entries(drawings)){
      if(d.userId===myId||isMJ){
        const near=d.points.some(([mx,my])=>{const sp=w2s(mx,my);return Math.hypot(sp.x-sx,sp.y-sy)<16;});
        if(near){delete drawings[id];send({type:"DELETE_DRAWING",drawId:id});drawAll();return;}}}
  }
}

function onMove(e){
  const{sx,sy}=evXY(e),wxy=s2w(sx,sy);
  hoverCell=wxy;
  document.getElementById("hover-info").textContent=`${wxy.x.toFixed(1)}m, ${wxy.y.toFixed(1)}m`;
  document.getElementById("hover-info").classList.add("show");
  if(panning){ox=panStart.ox+(sx-panStart.sx);oy=panStart.oy+(sy-panStart.sy);drawAll();return;}
  if(dragging){const t=tokens[dragging.id];if(t){t.x=snap(wxy.x-dragging.dx);t.y=snap(wxy.y-dragging.dy);drawAll();}return;}
  if(draggingObs){
    const o=obstacles[draggingObs.id];
    if(o){
      const nx=snap(wxy.x-draggingObs.dx),ny=snap(wxy.y-draggingObs.dy);
      if(nx!==o.x||ny!==o.y)draggingObs.moved=true;
      o.x=nx;o.y=ny;drawAll();
    }
    return;
  }
  if(tool==="ruler"&&rulerStart){rulerEnd={x:wxy.x,y:wxy.y};drawAll();return;}
  if(tool==="draw"&&drawingActive){
    if(drawStyle==="free"){
      drawPoints.push([wxy.x,wxy.y]);
      if(drawPoints.length%8===0)send({type:"SET_DRAWING",drawId:drawingActive,drawType:"free",points:[...drawPoints],color:activeColor,width:2});
      drawAll();
    } else if(drawShapeStart){
      drawAll();const a=w2s(drawShapeStart.x,drawShapeStart.y),b=w2s(wxy.x,wxy.y);
      mCtx.strokeStyle=activeColor;mCtx.lineWidth=2;mCtx.setLineDash([4,3]);mCtx.beginPath();
      if(drawStyle==="line"||drawStyle==="arrow"){mCtx.moveTo(a.x,a.y);mCtx.lineTo(b.x,b.y);mCtx.stroke();}
      else if(drawStyle==="rect"){mCtx.strokeRect(a.x,a.y,b.x-a.x,b.y-a.y);}
      mCtx.setLineDash([]);}
    return;}
  drawGrid();
}

function onUp(e){
  const{sx,sy}=evXY(e),wxy=s2w(sx,sy);
  if(dragging){const t=tokens[dragging.id];
    if(t)send({type:"SET_TOKEN",tokenId:t.id,x:t.x,y:t.y,color:t.color,label:t.label,userId:t.userId,notes:t.notes,hp:t.hp,maxHp:t.maxHp,size:t.size,sizeN:t.sizeN,conditions:t.conditions});
    dragging=null;}
  if(draggingObs){
    const o=obstacles[draggingObs.id];
    if(o){
      if(draggingObs.moved){
        // Drag → envoyer nouvelle position
        send({type:"SET_OBSTACLE",...o});
      } else {
        // Simple clic sans drag → ouvrir popup
        openObsPopup(o.obsId,sx,sy);
      }
    }
    draggingObs=null;
  }
  if(panning){panning=false;cMain.style.cursor=tool==="pan"?"grab":"crosshair";}
  if(tool==="draw"&&drawingActive){
    if(drawStyle==="free"&&drawPoints.length>1){
      send({type:"SET_DRAWING",drawId:drawingActive,drawType:"free",points:[...drawPoints],color:activeColor,width:2});
      drawings[drawingActive]={drawId:drawingActive,drawType:"free",points:[...drawPoints],color:activeColor,width:2,userId:myId};
    } else if(drawShapeStart&&drawStyle!=="free"){
      const pts=[[drawShapeStart.x,drawShapeStart.y],[wxy.x,wxy.y]];
      send({type:"SET_DRAWING",drawId:drawingActive,drawType:drawStyle,points:pts,color:activeColor,width:2});
      drawings[drawingActive]={drawId:drawingActive,drawType:drawStyle,points:pts,color:activeColor,width:2,userId:myId};
    }
    drawingActive=null;drawPoints=[];drawShapeStart=null;drawAll();}
}

function openTokenPopup(tokenId,sx,sy){

    s.style.border="2px solid transparent";s.style.cursor=canEdit?"pointer":"default";

      colorStrip.querySelectorAll("div").forEach(x=>{x.style.borderColor="transparent";x.style.transform="scale(1)";});
      s.style.borderColor="#fff";s.style.transform="scale(1.25)";

      drawAll();
    };}
    colorStrip.appendChild(s);
  });

  // Champs
  const fields=["tp-label","tp-hp","tp-maxhp","tp-notes"];
  fields.forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=!canEdit;});
  document.getElementById("tp-size").disabled=!canEdit;
  document.getElementById("tp-sizen").disabled=!canEdit;
  document.querySelectorAll(".cond-btn").forEach(btn=>{
    btn.classList.toggle("on",(t.conditions||[]).includes(btn.dataset.id));
    btn.style.pointerEvents=canEdit?"auto":"none";btn.style.opacity=canEdit?"1":"0.5";
  });

  document.getElementById("tp-label").value=t.label||"";
  document.getElementById("tp-hp").value=t.hp??"";
  document.getElementById("tp-maxhp").value=t.maxHp??"";
  const sizeEl=document.getElementById("tp-size");
  sizeEl.value=t.size||"Medium";
  document.getElementById("tp-sizen-row").style.display=t.size==="Custom"?"flex":"none";
  document.getElementById("tp-sizen").value=t.sizeN||1;
  sizeEl.onchange=()=>{if(canEdit)document.getElementById("tp-sizen-row").style.display=sizeEl.value==="Custom"?"flex":"none";};
  document.getElementById("tp-notes").value=t.notes||"";
  document.getElementById("tp-save").style.display=canEdit?"block":"none";

  const pop=document.getElementById("token-popup");
  pop.style.visibility="hidden";pop.style.display="block";pop.style.left="0px";pop.style.top="0px";
  const vw=window.innerWidth,vh=window.innerHeight;
  const pw=pop.offsetWidth,ph=pop.offsetHeight;
  if(vw<=540){pop.style.visibility="visible";return;}
  const canvasRect=cMain.getBoundingClientRect();
  const vx=canvasRect.left+sx,vy=canvasRect.top+sy;
  let left=vx+12,top=vy-ph/2;
  if(left+pw>vw-8)left=vx-pw-12;
  if(left<8)left=8;
  if(top+ph>vh-8)top=vh-ph-8;
  if(top<8)top=8;
  pop.style.left=left+"px";pop.style.top=top+"px";pop.style.visibility="visible";
}
function closeTokenPopup(){document.getElementById("token-popup").style.display="none";tokenPopupTarget=null;}
function saveTokenPopup(){
  if(!tokenPopupTarget)return;const t=tokens[tokenPopupTarget];if(!t)return;
  t.label=document.getElementById("tp-label").value||t.label;

        notes:t.notes,hp:t.hp,maxHp:t.maxHp,size:t.size,sizeN:t.sizeN,conditions:t.conditions});
  closeTokenPopup();drawAll();
}

function addRange(tokenId,m){
  const t=tokens[tokenId];if(!t)return;

  if(ex>=0)t.ranges.splice(ex,1);else t.ranges.push({r:m,color:rangeColor});
  send({type:"SET_RANGES",tokenId,ranges:t.ranges});drawAll();
}

function renderInitiatives(){

    row.innerHTML=`<span class="init-val">${ini.value}</span>
      <span class="init-name" style="${isActive?"color:var(--gold);font-weight:700":""}">${ini.name}</span>
      ${isMJ?`<button class="init-del" onclick="removeInit('${ini.tokenId}')">✕</button>`:""}`;
    list.appendChild(row);
  });
  const banner=document.getElementById("current-turn-banner");
  if(initiatives.length>0){
    const cur=initiatives[currentTurn]||initiatives[0];
    banner.textContent=`⚡ Tour de : ${cur?.name||"?"}`;
    banner.style.display="block";
  } else banner.style.display="none";
  drawAll();
}

function addInitEntry(){
  ensureInitArray();
  const name=document.getElementById("init-name-in").value.trim();
  const val=parseInt(document.getElementById("init-val-in").value)||0;
  if(!name)return;
  const tok=Object.values(tokens).find(t=>t.label===name);
  // Évite les doublons
  const existing=initiatives.findIndex(i=>i.tokenId===(tok?.id||name));
  if(existing>=0)initiatives.splice(existing,1);
  initiatives.push({tokenId:tok?.id||("npc_"+Date.now()),name,value:val});
  initiatives.sort((a,b)=>b.value-a.value);
  currentTurn=0;
  send({type:"SET_INITIATIVES",initiatives});renderInitiatives();
  document.getElementById("init-name-in").value="";document.getElementById("init-val-in").value="";
}

function removeInit(tid){
  ensureInitArray();
  initiatives=initiatives.filter(i=>i.tokenId!==tid);
  currentTurn=Math.min(currentTurn,Math.max(0,initiatives.length-1));
  send({type:"SET_INITIATIVES",initiatives});renderInitiatives();
}

function nextTurn(){
  ensureInitArray();
  if(!initiatives.length)return;
  currentTurn=(currentTurn+1)%initiatives.length;
  // Broadcast le tour actuel aussi
  send({type:"SET_INITIATIVES",initiatives});
  renderInitiatives();
}

// ════════════════════════════════════════
// DICE
// ════════════════════════════════════════
function toggleDice(){
  const p=document.getElementById("dice-panel");
  p.style.display=p.style.display==="block"?"none":"block";
}

function rollDice(sides){
  // Petite animation sur le bouton
  const result=Math.floor(Math.random()*sides)+1;
  const isCrit=sides===20&&result===20;
  const isFumble=sides===20&&result===1;
  const msg={type:"DICE_ROLL",dice:`d${sides}`,result,rolls:[result],isCrit,isFumble};
  send(msg);
  addDiceLog({...msg,name:myName});
}

function rollCustomDice(){
  const count=Math.min(20,parseInt(document.getElementById("dice-count").value)||1);
  const sides=Math.min(1000,parseInt(document.getElementById("dice-sides").value)||6);
  const rolls=Array.from({length:count},()=>Math.floor(Math.random()*sides)+1);
  const result=rolls.reduce((a,b)=>a+b,0);
  const max=count*sides, min=count;
  const isCrit=result===max;
  const isFumble=result===min;
  const msg={type:"DICE_ROLL",dice:`${count}d${sides}`,result,rolls,isCrit,isFumble};
  send(msg);
  addDiceLog({...msg,name:myName});
}

function addDiceLog(msg){
  diceLog.unshift(msg);if(diceLog.length>30)diceLog.pop();
  const log=document.getElementById("dice-log");
  log.innerHTML=diceLog.map((e,i)=>{
    const isMine=e.name===myName;
    const critStyle=e.isCrit?"color:var(--green);":"";
    const fumbleStyle=e.isFumble?"color:var(--red);":"";
    const resultStyle=critStyle||fumbleStyle;
    const badge=e.isCrit?` <span style="background:#52c97a22;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:1px 5px;font-size:.62rem">CRIT!</span>`
                :e.isFumble?` <span style="background:#e0525222;color:var(--red);border:1px solid var(--red);border-radius:4px;padding:1px 5px;font-size:.62rem">FUMBLE</span>`:"";
    const rollsText=e.rolls.length>1?`<span class="de-rolls">(${e.rolls.join("+")})</span>`:"";
    return `<div class="dice-entry${isMine?" mine":""}">
      <span class="de-name">${e.name}</span>
      <span class="de-dice">${e.dice}</span>
      ${rollsText}
      <span class="de-result" style="${resultStyle}">${e.result}${badge}</span>
    </div>`;
  }).join("");
  // Ouvrir le panel et scroll en haut
  document.getElementById("dice-panel").style.display="block";
  log.scrollTop=0;
  // Toast discret
  const badge=msg.isCrit?" 🎉 CRIT!":msg.isFumble?" 💀 FUMBLE":"";
  toast(`🎲 ${msg.name} : ${msg.dice} = ${msg.result}${badge}`);
}

// ════════════════════════════════════════
// OBSTACLE BANK
// ════════════════════════════════════════
function buildObsBank(){
  const bank=document.getElementById("obs-bank");bank.innerHTML="";
  for(const cat of OBS_BANK){
    const title=document.createElement("div");title.className="obs-cat-title";title.textContent=cat.cat;bank.appendChild(title);
    const grid=document.createElement("div");grid.className="obs-grid";
    for(const it of cat.items){
      const item=document.createElement("div");item.className="obs-item";
      item.innerHTML=`<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">${it.svg}</svg><span>${it.label}</span>`;
      item.onclick=()=>{
        pendingObsType=it.type;setTool("token");
        toast(`${it.label} — Cliquer sur la carte pour placer`);
        togglePanel("obs-panel");
        document.querySelectorAll(".obs-item").forEach(x=>x.classList.remove("sel"));item.classList.add("sel");
      };
      grid.appendChild(item);
    }
    bank.appendChild(grid);
    const sep=document.createElement("hr");sep.className="obs-sep";bank.appendChild(sep);
  }
  const clr=document.createElement("button");clr.id="obs-clear";clr.textContent="✕ Effacer tous les obstacles";
  clr.onclick=()=>{if(confirm("Effacer tous les obstacles ?"))clearObstacles();};bank.appendChild(clr);
}
function positionPopup(pop,sx,sy){
  // sx/sy = coords dans le canvas
  pop.style.visibility="hidden";pop.style.left="0px";pop.style.top="0px";
  const vw=window.innerWidth,vh=window.innerHeight;
  const pw=pop.offsetWidth,ph=pop.offsetHeight;
  if(vw<=540){pop.style.visibility="visible";return;}
  const canvasRect=cMain.getBoundingClientRect();
  let left=canvasRect.left+sx+12;
  let top=canvasRect.top+sy-ph/2;
  if(left+pw>vw-8)left=canvasRect.left+sx-pw-12;
  if(left<8)left=8;
  if(top+ph>vh-8)top=vh-ph-8;
  if(top<8)top=8;
  pop.style.left=left+"px";pop.style.top=top+"px";pop.style.visibility="visible";
}

function openObsPopup(obsId,sx,sy){
  if(!isMJ)return;
  selectedObs=obsId;
  const o=obstacles[obsId];if(!o)return;
  document.getElementById("obs-popup-title").textContent=getObsDef(o.obsType)?.label||"Obstacle";
  document.getElementById("obs-scale-range").value=o.scale||1;
  document.getElementById("obs-scale-val").textContent=(o.scale||1)+"×";
  document.getElementById("obs-rot-range").value=o.rotation||0;
  document.getElementById("obs-rot-val").textContent=(o.rotation||0)+"°";
  const pop=document.getElementById("obs-popup");pop.style.display="block";
  positionPopup(pop,sx,sy);
  drawAll();
}
function closeObsPopup(){
  document.getElementById("obs-popup").style.display="none";
  selectedObs=null;drawAll();
}
function updateObsScale(v){
  if(!selectedObs||!obstacles[selectedObs])return;
  obstacles[selectedObs].scale=parseFloat(v);
  document.getElementById("obs-scale-val").textContent=parseFloat(v).toFixed(2).replace(/\.?0+$/,"")+"×";
  send({type:"SET_OBSTACLE",...obstacles[selectedObs]});drawAll();
}
function updateObsRot(v){
  if(!selectedObs||!obstacles[selectedObs])return;
  obstacles[selectedObs].rotation=parseInt(v);
  document.getElementById("obs-rot-val").textContent=v+"°";
  send({type:"SET_OBSTACLE",...obstacles[selectedObs]});drawAll();
}
function obsRotate45(){
  if(!selectedObs||!obstacles[selectedObs])return;
  const o=obstacles[selectedObs];
  o.rotation=((o.rotation||0)+45)%360;
  document.getElementById("obs-rot-range").value=o.rotation;
  document.getElementById("obs-rot-val").textContent=o.rotation+"°";
  send({type:"SET_OBSTACLE",...o});drawAll();
}
function obsFlip(){
  if(!selectedObs||!obstacles[selectedObs])return;
  const o=obstacles[selectedObs];o.flipX=!o.flipX;
  send({type:"SET_OBSTACLE",...o});drawAll();
}
function deleteSelectedObs(){
  if(!selectedObs)return;
  delete obstacles[selectedObs];
  send({type:"DELETE_OBSTACLE",obsId:selectedObs});
  closeObsPopup();drawAll();
}
function clearObstacles(){obstacles={};send({type:"CLEAR_OBSTACLES"});drawAll();}

// ════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════
function setTool(t){
  if(t!=="ruler"){rulerStart=null;rulerEnd=null;}
  if(t!=="token"){pendingObsType=null;document.querySelectorAll(".obs-item").forEach(x=>x.classList.remove("sel"));}
  tool=t;
  document.querySelectorAll(".tbtn[id^='tb-']").forEach(b=>b.classList.remove("on"));
  const btn=document.getElementById("tb-"+t);if(btn)btn.classList.add("on");
  cMain.style.cursor=t==="pan"?"grab":t==="delete"?"not-allowed":"crosshair";
  document.getElementById("draw-opts").style.display=t==="draw"?"flex":"none";
  drawAll();
}
function setDrawStyle(s){
  drawStyle=s;
  document.querySelectorAll(".tbtn[id^='ds-']").forEach(b=>b.classList.remove("on"));
  document.getElementById("ds-"+s).classList.add("on");
}
function toggleGrid(){showGrid=!showGrid;document.getElementById("tb-grid").classList.toggle("on",showGrid);drawAll();}
function buildColors(){
  const strip=document.getElementById("colors");strip.innerHTML="";
  COLORS.forEach((c,i)=>{
    const s=document.createElement("div");s.className="swatch"+(i===0?" on":"");s.style.background=c;
    s.onclick=()=>{document.querySelectorAll(".swatch").forEach(x=>x.classList.remove("on"));s.classList.add("on");activeColor=c;};
    strip.appendChild(s);});
}
function updatePlayers(){
  const list=document.getElementById("plist");list.innerHTML="";
  playerIds.forEach((id,i)=>{
    const row=document.createElement("div");row.className="prow";
    const dot=document.createElement("span");dot.className="pdot";dot.style.background=COLORS[i%COLORS.length];
    const name=document.createElement("span");
    name.textContent=(playerNames[id]||"?")+(id===hostId?" 👑":"");
    if(id===myId)name.style.color="var(--gold)";
    row.appendChild(dot);row.appendChild(name);list.appendChild(row);});
}
function changeImage(){
  const input=document.createElement("input");input.type="file";input.accept="image/*";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{bgUrl=ev.target.result;bgImg=null;loadBg(bgUrl);send({type:"SET_IMAGE",imageUrl:bgUrl});};
    reader.readAsDataURL(file);
  };
  const choice=confirm("Importer depuis un fichier ?\n(Annuler = entrer une URL)");
  if(choice)input.click();
  else{
    const url=prompt("URL image HTTPS :",bgUrl);if(url===null)return;
    bgUrl=url.trim();if(bgUrl){loadBg(bgUrl);send({type:"SET_IMAGE",imageUrl:bgUrl});}
    else{bgImg=null;drawAll();}
  }
}
function clearAll(){if(!confirm("Effacer TOUT ?"))return;tokens={};drawings={};obstacles={};initiatives=[];send({type:"CLEAR_ALL"});renderInitiatives();drawAll();}
function copyLink(){navigator.clipboard.writeText(`${location.origin}/?lobby=${lobbyCode}`).then(()=>toast("Lien copié !"));}

function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}

let _tt;
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove("show"),2800);}

document.addEventListener("pointerdown",e=>{
  // Fermer les popups si clic en dehors (hors canvas — le canvas gère lui-même)
  if(e.target===cMain)return;
  const rp=document.getElementById("range-popup");
  if(rp.style.display==="block"&&!rp.contains(e.target))closeRangePopup();
  const tp=document.getElementById("token-popup");
  if(tp.style.display==="block"&&!tp.contains(e.target))closeTokenPopup();
  const op=document.getElementById("obs-popup");
  if(op.style.display==="block"&&!op.contains(e.target))closeObsPopup();
});

// ════════════════════════════════════════
// INIT — check session on load
// ════════════════════════════════════════
window.addEventListener("load",async()=>{
  const p=new URLSearchParams(location.search).get("lobby");
  if(p){document.getElementById("guest-code").value=p.toUpperCase();document.getElementById("dash-join-code").value=p.toUpperCase();}
  const ok=await checkAuth();
  if(ok)showDashboard();else showScreen("auth-screen");
});
</script>
